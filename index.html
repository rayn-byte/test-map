<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Map</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      flex-wrap: wrap;
      z-index: 10;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #e0e0e0; }

    #status { font-size: 0.78rem; color: #7c8db5; margin-left: auto; }
    #status.error  { color: #e06c75; }
    #status.loaded { color: #98c379; }

    #legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.73rem; color: #a0aec0; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background 0.15s; }
    .legend-item:hover { background: rgba(255,255,255,0.07); }
    .legend-dot  { width: 11px; height: 11px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); flex-shrink: 0; }

    /* Main content area */
    #content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #map {
      flex: 1;
      transition: margin-right 0.3s ease;
    }

    /* Sidebar */
    #sidebar {
      width: 320px;
      background: #16213e;
      border-left: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      position: relative;
      flex-shrink: 0;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    #sidebar-category {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #sidebar-title {
      font-size: 1rem;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 2px;
    }

    #sidebar-address {
      font-size: 0.78rem;
      color: #7c8db5;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    #sidebar-description {
      font-size: 0.8rem;
      color: #a0aec0;
      line-height: 1.5;
      padding-top: 8px;
      border-top: 1px solid #0f3460;
    }

    /* Arrow nav */
    #nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      background: #111827;
    }

    #nav-bar button {
      background: #0f3460;
      border: none;
      color: #e0e0e0;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #nav-bar button:hover { background: #4a9eff; }
    #nav-bar button:disabled { background: #1a2a40; color: #3a4a60; cursor: default; }

    #nav-counter {
      font-size: 0.78rem;
      color: #7c8db5;
    }

    #nav-hint {
      font-size: 0.68rem;
      color: #3a4a60;
      text-align: center;
      padding: 4px 0 2px;
      flex-shrink: 0;
    }

    /* Stop list */
    #stop-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #stop-list::-webkit-scrollbar { width: 5px; }
    #stop-list::-webkit-scrollbar-track { background: #111827; }
    #stop-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

    .stop-item {
      padding: 9px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }

    .stop-item:hover { background: rgba(74,158,255,0.08); }

    .stop-item.active {
      background: rgba(74,158,255,0.13);
      border-left-color: #4a9eff;
    }

    .stop-item-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 2px;
    }

    .stop-item-address {
      font-size: 0.73rem;
      color: #7c8db5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stop-item-index {
      font-size: 0.65rem;
      color: #3a4a60;
      float: right;
      margin-top: 2px;
    }

    /* Close button */
    #close-sidebar {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      color: #3a5070;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    #close-sidebar:hover { color: #e0e0e0; }

    #reload-btn {
      background: none; border: 1px solid #0f3460; color: #7c8db5;
      padding: 4px 11px; border-radius: 5px; font-size: 0.73rem;
      cursor: pointer; transition: all 0.2s;
    }
    #reload-btn:hover { border-color: #4a9eff; color: #4a9eff; }

    /* Leaflet popup (still used for non-sidebar quick view) */
    .leaflet-popup-content-wrapper {
      background: #16213e; color: #e0e0e0;
      border: 1px solid #0f3460; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: #16213e; }
  </style>
</head>
<body>

<header>
  <h1>📍 My Map</h1>
  <div id="legend"></div>
  <span id="status">Loading…</span>
  <button id="reload-btn" onclick="loadSheet()">↻ Refresh</button>
</header>

<div id="content">
  <div id="map"></div>

  <div id="sidebar">
    <button id="close-sidebar" onclick="closeSidebar()" title="Close">✕</button>

    <div id="sidebar-header">
      <div id="sidebar-category"></div>
      <div id="sidebar-title"></div>
      <div id="sidebar-address"></div>
      <div id="sidebar-description"></div>
    </div>

    <div id="nav-bar">
      <button id="btn-prev" onclick="stepStop(-1)" title="Previous (←)">◀</button>
      <span id="nav-counter"></span>
      <button id="btn-next" onclick="stepStop(1)" title="Next (→)">▶</button>
    </div>
    <div id="nav-hint">← → arrow keys to navigate</div>

    <div id="stop-list"></div>
  </div>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const SHEET_ID  = '10FYl3FarJYFjSPyfH5MuPt1pWQP1T_c8IZzCus8QFUg';
  const SHEET_GID = '2033436901';
  // ─────────────────────────────────────────────────────────────────────────

  const PALETTE = [
    '#4a9eff','#e06c75','#98c379','#e5c07b',
    '#c678dd','#56b6c2','#d19a66','#ff6b6b','#a8ff78','#61afef'
  ];
  const categoryColors = {};
  let colorIndex = 0;

  // All rows grouped by category
  let categoryGroups = {};
  // Currently open category & index
  let activeCategory = null;
  let activeIndex    = 0;
  // Map from rowId -> marker
  let markerMap = {};

  function colorFor(cat) {
    const key = (cat || 'Uncategorised').trim();
    if (!categoryColors[key]) {
      categoryColors[key] = PALETTE[colorIndex % PALETTE.length];
      colorIndex++;
    }
    return categoryColors[key];
  }

  function makeIcon(color, highlighted) {
    const r = highlighted ? 10 : 8;
    const stroke = highlighted ? 3 : 2;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${r*3}" height="${r*3}" viewBox="0 0 ${r*3} ${r*3}">
      <circle cx="${r*1.5}" cy="${r*1.5}" r="${r}" fill="${color}" stroke="white" stroke-width="${stroke}" opacity="${highlighted ? 1 : 0.92}"/>
      ${highlighted ? `<circle cx="${r*1.5}" cy="${r*1.5}" r="${r+4}" fill="none" stroke="${color}" stroke-width="2" opacity="0.4"/>` : ''}
    </svg>`;
    const size = r * 3;
    return L.divIcon({ html: svg, className: '', iconSize: [size,size], iconAnchor: [size/2,size/2], popupAnchor: [0,-(size/2+4)] });
  }

  // ── Map setup ─────────────────────────────────────────────────────────────
  const map = L.map('map').setView([40.7, -73.95], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);
  const markerLayer = L.layerGroup().addTo(map);

  function get(row, ...keys) {
    for (const k of keys) {
      if (row[k] !== undefined && row[k] !== null && row[k] !== '') return row[k];
    }
    return '';
  }

  // ── Load sheet ────────────────────────────────────────────────────────────
  function loadSheet() {
    const status = document.getElementById('status');
    status.textContent = 'Loading…';
    status.className = '';

    const jsonpUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:_mapCallback&gid=${SHEET_GID}`;
    const script = document.createElement('script');
    window._mapCallback = function(data) {
      document.head.removeChild(script);
      try { parseGviz(data); }
      catch(e) {
        status.textContent = 'Error parsing sheet: ' + e.message;
        status.className = 'error';
      }
    };
    script.src = jsonpUrl;
    script.onerror = () => {
      status.textContent = 'Could not reach Google Sheets. Check the sheet is public.';
      status.className = 'error';
    };
    document.head.appendChild(script);
  }

  function parseGviz(data) {
    const status = document.getElementById('status');
    const cols = data.table.cols.map(c => c.label);
    if (!data.table.rows || data.table.rows.length === 0) {
      status.textContent = 'Sheet appears empty.'; status.className = 'error'; return;
    }

    const rows = data.table.rows.map((r, i) => {
      const obj = { _id: i };
      cols.forEach((label, ci) => {
        obj[label] = r.c[ci] ? (r.c[ci].v !== null ? String(r.c[ci].v) : '') : '';
      });
      return obj;
    });

    markerLayer.clearLayers();
    markerMap = {};
    categoryGroups = {};
    Object.keys(categoryColors).forEach(k => delete categoryColors[k]);
    colorIndex = 0;

    let count = 0;
    const bounds = [];

    rows.forEach(row => {
      const lat = parseFloat(get(row,'Lat','lat','LAT','Latitude','latitude'));
      const lng = parseFloat(get(row,'Long','long','LONG','Lng','lng','Longitude','longitude'));
      if (isNaN(lat) || isNaN(lng)) return;

      row._lat = lat; row._lng = lng;
      const category = get(row,'Category','category','CATEGORY') || 'Uncategorised';
      const color = colorFor(category);

      if (!categoryGroups[category]) categoryGroups[category] = [];
      const catIndex = categoryGroups[category].length;
      categoryGroups[category].push(row);

      const marker = L.marker([lat, lng], { icon: makeIcon(color, false) });
      marker.on('click', () => openSidebar(category, catIndex));
      markerLayer.addLayer(marker);
      markerMap[row._id] = { marker, color };
      bounds.push([lat, lng]);
      count++;
    });

    // Legend
    const legend = document.getElementById('legend');
    legend.innerHTML = Object.entries(categoryColors).map(([cat, col]) =>
      `<div class="legend-item" onclick="filterCategory('${cat.replace(/'/g,"\\'")}')">
        <div class="legend-dot" style="background:${col}"></div>
        <span>${cat}</span>
      </div>`
    ).join('');

    if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40] });
    status.textContent = `${count} location${count !== 1 ? 's' : ''} loaded`;
    status.className = 'loaded';
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────
  function openSidebar(category, index) {
    // Reset all marker icons
    resetAllIcons();

    activeCategory = category;
    activeIndex    = index;

    document.getElementById('sidebar').classList.add('open');
    renderSidebar();
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    resetAllIcons();
    activeCategory = null;
  }

  function resetAllIcons() {
    Object.values(markerMap).forEach(({ marker, color }) => {
      marker.setIcon(makeIcon(color, false));
    });
  }

  function renderSidebar() {
    const stops = categoryGroups[activeCategory];
    const stop  = stops[activeIndex];
    const color = colorFor(activeCategory);

    // Header
    document.getElementById('sidebar-category').innerHTML =
      `<span style="background:${color}22;color:${color};border:1px solid ${color}55;
        display:inline-block;padding:2px 9px;border-radius:99px;font-size:0.68rem;
        font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px">
        ${activeCategory}
      </span>`;
    document.getElementById('sidebar-title').textContent   = get(stop,'Name','name','NAME') || '—';
    document.getElementById('sidebar-address').textContent = get(stop,'Address','address','ADDRESS') || '';
    const desc = get(stop,'Description','description','DESCRIPTION');
    document.getElementById('sidebar-description').textContent = desc;
    document.getElementById('sidebar-description').style.display = desc ? '' : 'none';

    // Nav counter
    document.getElementById('nav-counter').textContent = `${activeIndex + 1} of ${stops.length}`;
    document.getElementById('btn-prev').disabled = activeIndex === 0;
    document.getElementById('btn-next').disabled = activeIndex === stops.length - 1;

    // Highlight marker
    resetAllIcons();
    const row = stop;
    if (markerMap[row._id]) {
      markerMap[row._id].marker.setIcon(makeIcon(color, true));
      map.panTo([row._lat, row._lng], { animate: true, duration: 0.4 });
    }

    // Stop list
    const list = document.getElementById('stop-list');
    list.innerHTML = stops.map((s, i) => {
      const name    = get(s,'Name','name','NAME') || '—';
      const address = get(s,'Address','address','ADDRESS') || '';
      return `<div class="stop-item ${i === activeIndex ? 'active' : ''}" onclick="openSidebar('${activeCategory.replace(/'/g,"\\'")}', ${i})" data-idx="${i}">
        <span class="stop-item-index">#${i + 1}</span>
        <div class="stop-item-name">${name}</div>
        <div class="stop-item-address">${address}</div>
      </div>`;
    }).join('');

    // Scroll active item into view
    const activeEl = list.querySelector('.stop-item.active');
    if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function stepStop(dir) {
    if (!activeCategory) return;
    const stops = categoryGroups[activeCategory];
    const next  = activeIndex + dir;
    if (next < 0 || next >= stops.length) return;
    activeIndex = next;
    renderSidebar();
  }

  // ── Keyboard navigation ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (!activeCategory) return;
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); stepStop(-1); }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  { e.preventDefault(); stepStop(1);  }
    if (e.key === 'Escape') closeSidebar();
  });

  // ── Legend click — open first stop of that category ───────────────────────
  function filterCategory(cat) {
    if (categoryGroups[cat] && categoryGroups[cat].length > 0) {
      openSidebar(cat, 0);
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadSheet();
</script>
</body>
</html>
