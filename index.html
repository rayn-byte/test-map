<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Map</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #e0e0e0; }

    #status { font-size: 0.78rem; color: #7c8db5; margin-left: auto; }
    #status.error  { color: #e06c75; }
    #status.loaded { color: #98c379; }

    #legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.73rem; color: #a0aec0; }
    .legend-dot  { width: 11px; height: 11px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); flex-shrink: 0; }

    #map { flex: 1; }

    .leaflet-popup-content-wrapper {
      background: #16213e; color: #e0e0e0;
      border: 1px solid #0f3460; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: #16213e; }
    .leaflet-popup-content { margin: 12px 16px; min-width: 180px; }

    .popup-name        { font-weight: 700; font-size: 0.92rem; color: #e0e0e0; margin-bottom: 5px; }
    .popup-address     { font-size: 0.78rem; color: #7c8db5; margin-bottom: 5px; line-height: 1.4; }
    .popup-description { font-size: 0.8rem; color: #a0aec0; line-height: 1.5; border-top: 1px solid #0f3460; padding-top: 6px; margin-top: 4px; }
    .popup-category    {
      display: inline-block; font-size: 0.68rem; font-weight: 600;
      padding: 2px 8px; border-radius: 99px; margin-bottom: 7px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    #reload-btn {
      background: none; border: 1px solid #0f3460; color: #7c8db5;
      padding: 4px 11px; border-radius: 5px; font-size: 0.73rem;
      cursor: pointer; transition: all 0.2s;
    }
    #reload-btn:hover { border-color: #4a9eff; color: #4a9eff; }
  </style>
</head>
<body>

<header>
  <h1>📍 My Map</h1>
  <div id="legend"></div>
  <span id="status">Loading…</span>
  <button id="reload-btn" onclick="loadSheet()">↻ Refresh</button>
</header>

<div id="map"></div>

<script>
  // ── CONFIG — update these two values ─────────────────────────────────────
  const SHEET_ID = '10FYl3FarJYFjSPyfH5MuPt1pWQP1T_c8IZzCus8QFUg';
  const SHEET_GID = '2033436901';   // the gid from your URL after #gid=
  // ─────────────────────────────────────────────────────────────────────────

  const PALETTE = [
    '#4a9eff','#e06c75','#98c379','#e5c07b',
    '#c678dd','#56b6c2','#d19a66','#ff6b6b','#a8ff78','#61afef'
  ];
  const categoryColors = {};
  let colorIndex = 0;

  function colorFor(cat) {
    const key = (cat || 'Uncategorised').trim();
    if (!categoryColors[key]) {
      categoryColors[key] = PALETTE[colorIndex % PALETTE.length];
      colorIndex++;
    }
    return categoryColors[key];
  }

  function makeIcon(color) {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
      <circle cx="11" cy="11" r="8" fill="${color}" stroke="white" stroke-width="2.5" opacity="0.92"/>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [22,22], iconAnchor: [11,11], popupAnchor: [0,-13] });
  }

  const map = L.map('map').setView([39.5, -98.35], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);
  const markerLayer = L.layerGroup().addTo(map);

  function get(row, ...keys) {
    for (const k of keys) {
      if (row[k] !== undefined && row[k] !== null && row[k] !== '') return row[k];
    }
    return '';
  }

  function loadSheet() {
    const status = document.getElementById('status');
    status.textContent = 'Loading…';
    status.className = '';

    // Use the gviz JSON endpoint — works cross-origin on public sheets
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;

    const script = document.createElement('script');
    window._mapCallback = function(data) {
      document.head.removeChild(script);
      try {
        parseGviz(data);
      } catch(e) {
        status.textContent = 'Error parsing sheet data: ' + e.message;
        status.className = 'error';
      }
    };

    // gviz supports JSONP via the tqx=out:json&responseHandler param
    const jsonpUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:_mapCallback&gid=${SHEET_GID}`;
    script.src = jsonpUrl;
    script.onerror = () => {
      status.textContent = 'Could not reach Google Sheets. Check the sheet is public.';
      status.className = 'error';
    };
    document.head.appendChild(script);
  }

  function parseGviz(data) {
    const status = document.getElementById('status');
    const cols = data.table.cols.map(c => c.label);

    if (cols.length === 0 || !data.table.rows || data.table.rows.length === 0) {
      status.textContent = 'Sheet appears empty.';
      status.className = 'error';
      return;
    }

    // Build rows as objects keyed by column label
    const rows = data.table.rows.map(r => {
      const obj = {};
      cols.forEach((label, i) => {
        obj[label] = r.c[i] ? (r.c[i].v !== null ? String(r.c[i].v) : '') : '';
      });
      return obj;
    });

    markerLayer.clearLayers();
    Object.keys(categoryColors).forEach(k => delete categoryColors[k]);
    colorIndex = 0;

    let count = 0;
    const bounds = [];

    rows.forEach(row => {
      const lat = parseFloat(get(row, 'Lat','lat','LAT','Latitude','latitude'));
      const lng = parseFloat(get(row, 'Long','long','LONG','Lng','lng','Longitude','longitude'));
      if (isNaN(lat) || isNaN(lng)) return;

      const name        = get(row, 'Name','name','NAME');
      const address     = get(row, 'Address','address','ADDRESS');
      const description = get(row, 'Description','description','DESCRIPTION');
      const category    = get(row, 'Category','category','CATEGORY') || 'Uncategorised';

      const color = colorFor(category);
      const marker = L.marker([lat, lng], { icon: makeIcon(color) });

      marker.bindPopup(`
        <div class="popup-name">${name}</div>
        <span class="popup-category" style="background:${color}22;color:${color};border:1px solid ${color}55">${category}</span>
        ${address     ? `<div class="popup-address">📍 ${address}</div>` : ''}
        ${description ? `<div class="popup-description">${description}</div>` : ''}
      `);

      markerLayer.addLayer(marker);
      bounds.push([lat, lng]);
      count++;
    });

    // Rebuild legend
    const legend = document.getElementById('legend');
    legend.innerHTML = Object.entries(categoryColors).map(([cat, col]) =>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${col}"></div>
        <span>${cat}</span>
      </div>`
    ).join('');

    if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40] });

    status.textContent = `${count} location${count !== 1 ? 's' : ''} loaded`;
    status.className = 'loaded';
  }

  // Load on startup
  loadSheet();
</script>
</body>
</html>
